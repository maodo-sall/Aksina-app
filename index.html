<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aksina</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap');
  :root{
    --orange:#E8431A;--orange2:#F97316;--gold:#FBBF24;
    --navy:#1E3A5F;--blue:#2563EB;--green:#10B981;--red:#EF4444;--purple:#7C3AED;
    --ink:#0F1720;--muted:#5B6B7A;--border:#E4E9EE;--panel:#FFFFFF;--page:#F7F8FA;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:'Inter',sans-serif;background:#0d1420;color:var(--ink);display:flex;justify-content:center;padding:0;overflow-x:hidden;}
  #universAksina{position:fixed;inset:0;z-index:0;overflow:hidden;background:radial-gradient(ellipse at 30% 20%,#1a2f52,#0d1420 60%);pointer-events:none;}
  #universAksina .orb{position:absolute;border-radius:50%;filter:blur(40px);opacity:.35;animation:universDrift 22s ease-in-out infinite;}
  @keyframes universDrift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-30px) scale(1.15);}}
  .app{width:100%;max-width:430px;min-height:100vh;background:rgba(247,248,250,.86);backdrop-filter:blur(2px);display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.4);position:relative;z-index:1;}
  .page-bg{background:transparent !important;}

  @keyframes gpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
  @keyframes ringSpin{to{transform:rotate(360deg);}}
  .live-ring{position:relative;border-radius:13px;padding:3px;overflow:hidden;}
  .live-ring::before{
    content:'';position:absolute;width:220%;height:220%;top:50%;left:50%;margin-top:-110%;margin-left:-110%;
    background:conic-gradient(from 0deg, var(--ring-c1,#EF4444), var(--ring-c2,#F97316), var(--ring-c1,#EF4444));
    animation:ringSpin 2.2s linear infinite;pointer-events:none;
  }
  .live-ring-inner{position:relative;z-index:1;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .fadeUp{animation:fadeUp .35s ease both;}

  /* SPLASH */
  .splash{min-height:100vh;background:radial-gradient(circle at 50% 0%,#24406b,#0f1c33 55%,#0a1424);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;color:#fff;text-align:center;}
  .splash-icon{width:78px;height:78px;border-radius:24px;background:linear-gradient(135deg,var(--orange),var(--gold));display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 18px 40px rgba(232,67,26,.4);margin-bottom:18px;}
  .splash-name{font-family:'Playfair Display',serif;font-size:46px;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
  .splash-tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:14px;}
  .splash-desc{font-size:13px;color:rgba(255,255,255,.65);max-width:280px;line-height:1.7;margin-bottom:44px;}
  .splash-btn{width:100%;max-width:280px;background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff;font-size:15px;font-weight:700;padding:16px 28px;border-radius:30px;cursor:pointer;box-shadow:0 10px 26px rgba(232,67,26,.45);}

  /* ROLE PICK */
  .rolepick{min-height:100vh;background:linear-gradient(180deg,#0f1c33,#141d2c 30%,var(--page) 30%);padding:20px 20px 40px;}
  .rp-hdr{color:#fff;text-align:center;padding:20px 0 26px;}
  .rp-hdr .t{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;}
  .rp-hdr .s{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;}
  .role-card{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;cursor:pointer;box-shadow:0 10px 30px rgba(15,23,32,.08);border:2px solid transparent;transition:.15s;display:flex;align-items:center;gap:16px;}
  .role-card:active{transform:scale(.98);}
  .role-card .ic{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  .role-card.rc-client .ic{background:linear-gradient(135deg,#DBEAFE,#BFDBFE);}
  .role-card.rc-vendeur .ic{background:linear-gradient(135deg,#FEF3C7,#FDE68A);}
  .role-card.rc-livreur .ic{background:linear-gradient(135deg,#DCFCE7,#BBF7D0);}
  .role-card .rt{font-size:15px;font-weight:800;color:var(--ink);}
  .role-card .rd{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .role-card .arrow{margin-left:auto;color:var(--orange);font-size:18px;}

  /* ONBOARDING */
  .onb-form{min-height:100vh;background:var(--page);padding:0;}
  .onb-hero{background:linear-gradient(135deg,var(--navy),var(--blue));padding:40px 24px 30px;color:#fff;text-align:center;}
  .onb-hero .oi{font-size:34px;margin-bottom:8px;}
  .onb-hero .ot{font-family:'Playfair Display',serif;font-size:19px;font-weight:800;}
  .onb-body{padding:24px 22px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;color:var(--ink);}
  .field input{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:12px;font-size:14.5px;font-family:inherit;background:#fff;}
  .field input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,67,26,.1);}
  .btn-primary{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff;padding:15px;border-radius:14px;font-weight:800;font-size:14.5px;cursor:pointer;box-shadow:0 10px 24px rgba(232,67,26,.3);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
  .btn-ghost{width:100%;background:none;border:none;color:var(--muted);padding:13px;font-weight:600;font-size:13px;cursor:pointer;}

  /* HEADER */
  .hdr{background:linear-gradient(135deg,var(--navy),var(--blue));padding:16px 18px 14px;color:#fff;flex-shrink:0;position:relative;overflow:hidden;}
  .hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(232,67,26,.35),transparent 70%);}
  .hdr-row{display:flex;justify-content:space-between;align-items:center;position:relative;}
  .logo{font-family:'Playfair Display',serif;font-weight:900;font-size:21px;}
  .role-badge{font-size:10.5px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.15);}
  .geo-line{display:flex;align-items:center;gap:6px;margin-top:9px;position:relative;}
  .gdot{width:7px;height:7px;border-radius:50%;background:#4ADE80;animation:gpulse 1.6s ease-in-out infinite;flex-shrink:0;}
  .geo-txt{font-size:11px;font-weight:700;color:#BBF7D0;}
  .geo-sub{font-size:10px;color:rgba(255,255,255,.5);}

  .main{flex:1;overflow-y:auto;padding:16px 16px 92px;}

  /* GENERIC CARDS */
  .sbar{display:flex;gap:8px;margin-bottom:6px;background:#fff;border-radius:14px;padding:4px;box-shadow:0 4px 14px rgba(15,23,32,.06);border:1px solid var(--border);}
  .sbar input{flex:1;padding:11px 12px;border:none;font-size:14.5px;font-family:inherit;background:transparent;}
  .sbar input:focus{outline:none;}
  .sbar button{background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff;padding:0 18px;border-radius:11px;font-weight:700;font-size:13px;cursor:pointer;}
  .search-hint{font-size:10.5px;color:var(--muted);margin:8px 2px 16px;line-height:1.6;}
  .sec-lbl{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:4px 0 10px;}

  .pcard{background:#fff;border-radius:16px;padding:14px 15px;margin-bottom:11px;box-shadow:0 3px 12px rgba(15,23,32,.05);border:1.5px solid var(--border);position:relative;}
  .pcard.best{border-color:rgba(16,185,129,.45);background:linear-gradient(180deg,rgba(16,185,129,.04),#fff 40%);}
  .pcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .pcard-name{font-size:14px;font-weight:800;}
  .pcard-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .local-badge{font-size:10px;color:var(--muted);background:var(--page);border:1px solid var(--border);padding:2px 8px;border-radius:10px;}
  .trust-badge{font-size:10px;font-weight:700;color:var(--green);background:rgba(16,185,129,.1);padding:2px 8px;border-radius:10px;}
  .pcard-price{text-align:right;flex-shrink:0;}
  .pcard-price .total{font-size:16px;font-weight:900;color:var(--orange);}
  .pcard-price .detail{font-size:9.5px;color:var(--muted);margin-top:1px;}
  .win-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--green),#059669);padding:4px 10px;border-radius:9px;margin-top:9px;}
  .add-cart-btn{width:100%;margin-top:10px;background:var(--navy);border:none;color:#fff;padding:9px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;}

  .empty{text-align:center;padding:44px 16px;color:var(--muted);font-size:13px;line-height:1.7;}
  .empty .eic{font-size:34px;margin-bottom:10px;display:block;}

  .seek-box{background:linear-gradient(135deg,rgba(37,99,235,.08),rgba(124,58,237,.04));border:1.5px solid rgba(37,99,235,.2);border-radius:18px;padding:20px 18px;text-align:center;margin-top:6px;}
  .seek-box .si{font-size:28px;margin-bottom:8px;}
  .seek-box h4{font-family:'Playfair Display',serif;font-size:16px;margin:0 0 6px;}
  .seek-box p{font-size:12px;color:var(--ink);opacity:.7;line-height:1.6;margin:0 0 16px;}

  .req-card{background:#fff;border-radius:16px;padding:14px 15px;margin-bottom:12px;box-shadow:0 3px 12px rgba(15,23,32,.05);border:1px solid var(--border);}
  .req-obj{font-size:14px;font-weight:800;margin-bottom:8px;}
  .status-line{display:flex;align-items:center;gap:9px;background:var(--page);border-radius:11px;padding:10px 13px;}
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .status-dot.wait{background:var(--orange);animation:gpulse 1.5s ease-in-out infinite;}
  .status-dot.mid{background:var(--blue);animation:gpulse 1.5s ease-in-out infinite;}
  .status-dot.done{background:var(--green);}
  .status-txt{font-size:12px;font-weight:700;flex:1;}
  .status-time{font-size:10px;color:var(--muted);}
  .resp-box{background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(16,185,129,.03));border-radius:12px;padding:11px 13px;margin-top:10px;}
  .resp-box .n{font-size:13px;font-weight:800;color:#059669;}
  .resp-box .m{font-size:11.5px;color:var(--ink);opacity:.75;margin-top:3px;}

  .tech-toggle{font-size:10.5px;color:var(--muted);text-align:center;margin-top:16px;cursor:pointer;}
  .tech-box{background:var(--ink);color:#F4F6F8;border-radius:12px;padding:13px 14px;margin-top:10px;font-family:monospace;font-size:10px;line-height:1.8;display:none;}
  .tech-box.show{display:block;}

  .respond-form{display:flex;gap:7px;margin-top:11px;}
  .respond-form input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:9px 10px;font-size:12.5px;font-family:inherit;background:var(--page);}
  .respond-form input:focus{outline:none;border-color:var(--orange);}
  .respond-btn{background:linear-gradient(135deg,var(--navy),var(--blue));border:none;color:#fff;border-radius:10px;padding:0 14px;font-size:12.5px;font-weight:800;cursor:pointer;}

  .catalog-item{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:9px;box-shadow:0 2px 8px rgba(15,23,32,.04);}
  .catalog-item .cn{font-size:13.5px;font-weight:700;}
  .catalog-item .cz{font-size:10.5px;color:var(--muted);margin-top:2px;}
  .catalog-item .cp{font-size:14px;font-weight:800;color:var(--orange);}
  .add-form{display:flex;gap:7px;margin-bottom:18px;background:#fff;border-radius:14px;padding:5px;box-shadow:0 3px 12px rgba(15,23,32,.05);border:1px solid var(--border);}
  .add-form input{flex:1;border:none;padding:9px 10px;font-size:13px;font-family:inherit;background:transparent;}
  .add-form input:focus{outline:none;}
  .add-form button{background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff;border-radius:10px;padding:0 16px;font-weight:800;font-size:17px;cursor:pointer;}

  .profile-box{text-align:center;padding:26px 0 10px;}
  .profile-avatar{width:76px;height:76px;border-radius:24px;background:linear-gradient(135deg,var(--orange),var(--gold));display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:900;margin:0 auto 14px;box-shadow:0 12px 26px rgba(232,67,26,.3);}
  .profile-name{font-size:18px;font-weight:800;}
  .profile-meta{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .profile-role-tag{display:inline-block;margin-top:10px;font-size:11px;font-weight:800;background:#fff;border:1px solid var(--border);padding:6px 14px;border-radius:20px;}
  .profile-stats{display:flex;gap:10px;margin:22px 0;}
  .pstat{flex:1;background:#fff;border-radius:14px;padding:14px 8px;text-align:center;border:1px solid var(--border);}
  .pstat .num{font-size:20px;font-weight:900;color:var(--orange);}
  .pstat .lbl{font-size:9.5px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;}

  /* DASHBOARD (vendeur) */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .kpi{background:#fff;border-radius:16px;padding:16px;border:1px solid var(--border);box-shadow:0 3px 12px rgba(15,23,32,.05);}
  .kpi .kv{font-size:24px;font-weight:900;color:var(--navy);}
  .kpi .kl{font-size:10.5px;color:var(--muted);margin-top:4px;}
  .kpi.hot .kv{color:var(--orange);}

  .home-hero{background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:18px;padding:20px;color:#fff;margin-bottom:16px;}
  .home-hero .ht{font-family:'Playfair Display',serif;font-size:17px;font-weight:800;margin-bottom:4px;}
  .home-hero .hs{font-size:11.5px;color:rgba(255,255,255,.7);line-height:1.6;}

  .b2b-box{text-align:center;padding:50px 20px;}
  .b2b-box .bi2{font-size:40px;margin-bottom:14px;}
  .b2b-box h3{font-family:'Playfair Display',serif;font-size:18px;margin:0 0 8px;}
  .b2b-box p{font-size:12.5px;color:var(--muted);line-height:1.7;max-width:280px;margin:0 auto;}

  /* NAV */
  .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 10px;box-shadow:0 -6px 20px rgba(15,23,32,.06);}
  .bi{flex:1;text-align:center;padding:5px 0;font-size:9.5px;color:var(--muted);cursor:pointer;font-weight:700;}
  .bi .bic{font-size:19px;display:block;margin-bottom:3px;position:relative;}
  .bi.on{color:var(--orange);}
  .navbadge{position:absolute;top:-4px;right:calc(50% - 16px);background:var(--red);color:#fff;font-size:8px;font-weight:800;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div id="universAksina">
  <div class="orb" style="width:220px;height:220px;background:var(--orange);top:8%;left:-10%;"></div>
  <div class="orb" style="width:180px;height:180px;background:var(--blue);top:55%;right:-8%;animation-delay:-8s;"></div>
  <div class="orb" style="width:150px;height:150px;background:var(--gold);bottom:5%;left:15%;animation-delay:-14s;"></div>
</div>
<div class="app">
  <div id="hdr"></div>
  <div id="main"></div>
  <div id="bnav" class="bnav" style="display:none;"></div>
  <div id="aiFloatBtn" style="display:none;position:fixed;bottom:76px;right:20px;width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#60A5FA,#1E3A5F);box-shadow:0 4px 14px rgba(0,0,0,.35);align-items:center;justify-content:center;cursor:pointer;z-index:80;border:2px solid rgba(255,255,255,.4);">
    <span style="font-size:11px;font-weight:900;color:#fff;">AKS</span>
  </div>
  <div id="aiPanel" style="display:none;position:fixed;bottom:76px;right:20px;left:20px;max-width:390px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.25);z-index:90;overflow:hidden;">
    <div style="background:linear-gradient(135deg,#1E3A5F,#2563EB);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;">
      <div style="color:#fff;font-size:12.5px;font-weight:800;">🤖 Assistant Aksina</div>
      <button id="aiPanelClose" style="background:none;border:none;color:#fff;font-size:16px;cursor:pointer;">✕</button>
    </div>
    <div id="aiMessages" style="max-height:280px;overflow-y:auto;padding:12px 14px;font-size:12.5px;"></div>
    <div style="display:flex;gap:7px;padding:10px 12px;border-top:1px solid #eee;">
      <input id="aiInput" placeholder="Que cherchez-vous ?" style="flex:1;border:1.5px solid #E4E9EE;border-radius:9px;padding:9px 11px;font-size:12.5px;font-family:inherit;">
      <button id="aiSend" style="background:#E8431A;border:none;color:#fff;border-radius:9px;padding:0 14px;font-weight:700;cursor:pointer;">→</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = 'https://yoqxqdrffihtampxrmqc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oiaGH8-CzwO6WCAc7gP4zA_YXW0qs_G';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUserId = null;

async function checkSession(){
  try{
    const { data } = await sbClient.auth.getSession();
    if(data && data.session){ currentUserId = data.session.user.id; return true; }
    return false;
  } catch(e){
    console.error('Vérification de session impossible', e);
    return false;
  }
}

let offlineNoticeShown = false;
function notifyOfflineMode(reason){
  if(offlineNoticeShown) return;
  offlineNoticeShown = true;
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:80px;left:16px;right:16px;max-width:398px;margin:0 auto;background:#8A5A0F;color:#fff;padding:11px 14px;border-radius:11px;font-size:11.5px;line-height:1.5;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,.3);';
  toast.textContent = reason === 'auth'
    ? "Connexion au compte impossible (l'inscription anonyme est peut-être désactivée dans Supabase → Authentication → Providers). Vos données ne seront pas partagées entre appareils tant que ce n'est pas activé."
    : "La base de données n'a pas répondu correctement à une action. Vérifiez la connexion internet — certaines données peuvent ne pas être enregistrées.";
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 7000);
}

/* ---- lecture générique d'une table (retourne toutes les lignes, tri chronologique) ---- */
async function fetchAll(table){
  const { data, error } = await sbClient.from(table).select('*').order('created_at', { ascending: true });
  if(error){ console.error(error); notifyOfflineMode('db'); return []; }
  return data;
}

/* ---- mappers snake_case (base) <-> camelCase (application) ---- */
function mapCatalogue(r){ return { id:r.id, vendeurNom:r.vendeur_nom, vendeurUserId:r.vendeur_user_id, zone:r.zone, produit:r.produit, prix:Number(r.prix), stock:r.stock==null?10:Number(r.stock), photoUrl:r.photo_url||null, createdAt:new Date(r.created_at).getTime() }; }

async function uploadProductPhoto(file){
  try{
    const path = `${currentUserId}/${uid()}.jpg`;
    const { error } = await sbClient.storage.from('produits').upload(path, file);
    if(error){ console.error(error); notifyOfflineMode('db'); return null; }
    const { data } = sbClient.storage.from('produits').getPublicUrl(path);
    return data.publicUrl;
  } catch(e){ console.error(e); return null; }
}

function mapOrder(r){ return { id:r.id, clientNom:r.client_nom, clientUserId:r.client_user_id, clientZone:r.client_zone, vendeurNom:r.vendeur_nom, vendeurUserId:r.vendeur_user_id, vendeurZone:r.vendeur_zone, produit:r.produit, prix:Number(r.prix), status:r.status, factureNum:r.facture_num, ledgerId:r.ledger_id, createdAt:new Date(r.created_at).getTime() }; }

/* ================= TEMPS RÉEL ================= */
function setupRealtime(){
  sbClient.channel('aksina-realtime')
    .on('postgres_changes', { event:'*', schema:'public', table:'app_catalogue' }, () => { if(['home','search','produits','dashboard'].includes(app.tab)) renderApp(); })
    .on('postgres_changes', { event:'*', schema:'public', table:'app_solicitations' }, () => { if(['home','delivery','commandes','dashboard','profile'].includes(app.tab)) renderApp(); })
    .on('postgres_changes', { event:'*', schema:'public', table:'app_orders' }, () => { if(['commandes','dashboard','profile'].includes(app.tab)) renderApp(); })
    .on('postgres_changes', { event:'*', schema:'public', table:'app_livraisons' }, () => { if(['delivery','mission','rhome','revenus','commandes','profile'].includes(app.tab)) renderApp(); })
    .subscribe();
}

/* ================= BOOT ================= */
async function boot(){
  setupRealtime();
  const hasSession = await checkSession();
  if(!hasSession){ renderAuthChoice(); return; }
  await afterAuthProceed();
}

async function afterAuthProceed(){
  const activeRole = await getActiveRoleDb();
  if(!activeRole){ renderRolePick(); return; }
  const profile = await getMyProfile(activeRole);
  if(!profile){ renderRolePick(activeRole); return; }
  app.role = activeRole; app.profile = profile;
  app.tab = activeRole === 'client' ? 'home' : (activeRole === 'vendeur' ? 'dashboard' : 'rhome');
  renderApp();
}

function phoneToPseudoEmail(phone){
  const digits = phone.replace(/[^0-9]/g, '');
  return `${digits}@aksina-app.vercel.app`;
}

function renderAuthFormShell(title, submitLabel, isSignup){
  const m = document.getElementById('main');
  m.style.padding = '0';
  m.innerHTML = `

      <div class="onb-hero"><div class="oi">🔒</div><div class="ot">${title}</div></div>

        <div id="authStatus" style="font-size:11px;color:var(--red);margin-bottom:10px;min-height:14px;"></div>
        <button class="btn-primary" id="authSubmit">${submitLabel}</button>
        <button class="btn-ghost" id="authBack">← Retour</button>
      </div>
    </div>`;
  document.getElementById('authBack').addEventListener('click', renderAuthChoice);

  let mode = 'phone';
  m.querySelectorAll('.auth-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      mode = btn.getAttribute('data-mode');
      m.querySelectorAll('.auth-mode-btn').forEach(b => { b.style.background='#fff'; b.style.color='var(--ink)'; b.style.borderColor='var(--border)'; });
      btn.style.background='var(--orange)'; btn.style.color='#fff'; btn.style.borderColor='var(--orange)';
      const input = document.getElementById('authIdentifier');
      const label = document.getElementById('authIdLabel');
      if(mode==='phone'){ input.type='tel'; input.placeholder='77 123 45 67'; label.textContent='Numéro de téléphone'; }
      else { input.type='email'; input.placeholder='vous@exemple.com'; label.textContent='Email'; }
    });
  });
  m.getAuthMode = () => mode;
}

function renderSignupForm(){
  renderAuthFormShell('Créer votre compte', "S'inscrire", true);
  const m = document.getElementById('main');
  document.getElementById('authSubmit').addEventListener('click', async () => {
    const raw = document.getElementById('authIdentifier').value.trim();
    const password = document.getElementById('authPassword').value;
    const status = document.getElementById('authStatus');
    const mode = m.getAuthMode();
    if(!raw || password.length < 6){ status.textContent = (mode==='phone'?'Numéro de téléphone':'Email valide') + ' et mot de passe de 6 caractères minimum requis.'; return; }
    const email = mode === 'phone' ? phoneToPseudoEmail(raw) : raw;
    status.style.color = 'var(--muted)'; status.textContent = 'Création du compte…';
    const { data, error } = await sbClient.auth.signUp({ email, password });
    if(error){ status.style.color = 'var(--red)'; status.textContent = `[${error.status||'?'}] ${error.message}`; console.error('Erreur signup:', error); return; }
    if(data.session){ currentUserId = data.session.user.id; await afterAuthProceed(); }
    else if(mode === 'phone'){ currentUserId = data.user.id; await afterAuthProceed(); }
    else { status.style.color = 'var(--green)'; status.textContent = '✅ Compte créé. Vérifiez votre email pour confirmer, puis connectez-vous.'; }
  });
}

function renderLoginForm(){
  renderAuthFormShell('Connexion', 'Se connecter', false);
  const m = document.getElementById('main');
  document.getElementById('authSubmit').addEventListener('click', async () => {
    const raw = document.getElementById('authIdentifier').value.trim();
    const password = document.getElementById('authPassword').value;
    const status = document.getElementById('authStatus');
    const mode = m.getAuthMode();
    if(!raw || !password){ status.textContent = 'Entrez vos identifiants.'; return; }
    const email = mode === 'phone' ? phoneToPseudoEmail(raw) : raw;
    status.style.color = 'var(--muted)'; status.textContent = 'Connexion…';
    const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
    if(error){ status.style.color = 'var(--red)'; status.textContent = `[${error.status||'?'}] ${error.message}`; console.error('Erreur login:', error); return; }
    currentUserId = data.session.user.id;
    await afterAuthProceed();
  });
}

        </div>
        <button class="btn-primary" id="obSubmit">Continuer →</button>
        <button class="btn-ghost" id="obBack">← Retour</button>

  document.getElementById('geoBtn').addEventListener('click', () => runAutoGeo(true));

    const nom = document.getElementById('obNom').value.trim();
    const zone = document.getElementById('obZone').value.trim();
    if(!nom || !zone) return;
    await saveMyProfile(preselect, nom, zone);

    // Un Vendeur ou un Livreur possède automatiquement un profil Client,
    // dans le même compte, dès son inscription.
    if(preselect === 'vendeur' || preselect === 'livreur'){
      const existingClient = await getMyProfile('client');
      if(!existingClient) await saveMyProfile('client', nom, zone);
    }

    await setActiveRoleDb(preselect);
    app.role = preselect; app.profile = { nom, zone };
    app.tab = preselect === 'client' ? 'home' : (preselect === 'vendeur' ? 'dashboard' : 'rhome');
    renderApp();
  });
  runAutoGeo(false);
}

function runAutoGeo(manual){
  const status = document.getElementById('geoStatus');
  const zoneInput = document.getElementById('obZone');
  if(!navigator.geolocation){ status.textContent = manual ? 'Géolocalisation non disponible sur cet appareil.' : ''; return; }
  status.textContent = '📡 Détection automatique de votre position…';
  navigator.geolocation.getCurrentPosition(async (pos) => {
    try{
      const {latitude, longitude} = pos.coords;
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=14&addressdetails=1`);
      const data = await res.json();
      const a = data.address || {};
      const zoneName = a.suburb || a.neighbourhood || a.town || a.city || a.county || data.display_name;
      zoneInput.value = zoneName;
      status.textContent = '✅ Position détectée automatiquement — modifiable si besoin.';
    } catch(e){ status.textContent = "Détection automatique impossible. Vous pouvez entrer votre zone manuellement."; }
  }, () => {
    status.textContent = manual ? 'Accès à la position refusé.' : "Détection automatique refusée. Entrez votre zone manuellement, ou autorisez la position et réessayez.";
  });
}

async function loadTrendAndBadges(){
  const sol = await fetchSolicitationsAll();
  const t1 = document.getElementById('trendLine1');
  const t2 = document.getElementById('trendLine2');
  const icon = document.getElementById('canvasIcon');

  if(t1){
    if(app.role === 'vendeur'){
      const pending = sol.filter(s => s.status==='en_attente');
      const counts = {};
      pending.forEach(s => { counts[s.produit] = (counts[s.produit]||0) + 1; });
      const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
      icon.textContent = '🔎';
      const canvasEl = document.getElementById('topCanvas');
      if(pending.length){
        canvasEl.classList.add('live-ring');
        canvasEl.style.setProperty('--ring-c1', '#EF4444');
        canvasEl.style.setProperty('--ring-c2', '#F97316');
      } else {
        canvasEl.classList.remove('live-ring');
      }
      if(sorted.length){
        t1.textContent = `${pending.length} produit${pending.length>1?'s':''} recherché${pending.length>1?'s':''} non trouvé${pending.length>1?'s':''}`;
        t2.textContent = `dont « ${sorted[0][0]} » (${sorted[0][1]}×) — voir tout →`;
      } else {
        t1.textContent = 'Aucune demande non satisfaite';
        t2.textContent = 'Les recherches infructueuses apparaîtront ici';
      }
    } else {
      icon.textContent = '🌍';
      t1.textContent = 'Univers Aksina';
      t2.textContent = 'Le monde qui inspire — bientôt';
    }
  }

  let badgeCount = 0;
  if(app.role === 'client'){
    const livs = await fetchLivraisonsAll();
    badgeCount = livs.filter(l => l.clientUserId===currentUserId && l.status !== 'livree').length;
  } else if(app.role === 'vendeur'){
    const orders = await fetchOrdersAll();
    badgeCount = orders.filter(o => o.vendeurUserId===currentUserId && o.status==='nouvelle').length;
  } else {
    const livs = await fetchLivraisonsAll();
    badgeCount = livs.filter(l=>l.status==='a_livrer').length;
  }
  const badge = document.getElementById('bellBadge');
  if(badge){
    if(badgeCount > 0){ badge.style.display='flex'; badge.textContent = badgeCount > 9 ? '9+' : badgeCount; }
    else badge.style.display = 'none';
  }
}

function renderFolderList(){
  const list = document.getElementById('folderList');
  if(!list) return;
  const q = (document.getElementById('folderSearch').value || '').trim().toLowerCase();
  let items = folderState.items.filter(it => !q || it.searchText.toLowerCase().includes(q));
  if(folderState.sort === 'date') items.sort((a,b)=>b.date-a.date);
  else if(folderState.sort === 'produit') items.sort((a,b)=>a.primary.localeCompare(b.primary));
  else if(folderState.sort === 'client') items.sort((a,b)=>a.secondary.localeCompare(b.secondary));

  if(!items.length){ list.innerHTML = `<div class="empty">Aucun résultat.</div>`; return; }
  list.innerHTML = items.map(it => `
    <div class="folder-item-row catalog-item" data-idx="${folderState.items.indexOf(it)}" style="cursor:pointer;">
      <div><div class="cn">${esc(it.primary)}</div><div class="cz">${esc(it.secondary)} · ${new Date(it.date).toLocaleDateString('fr-FR')}</div></div>
      <div class="cp">${esc(it.amount)}</div>
    </div>`).join('');
  list.querySelectorAll('.folder-item-row').forEach(row => {
    row.addEventListener('click', () => {
      const it = folderState.items[Number(row.getAttribute('data-idx'))];
      if(it) renderDetailModal(it.primary, it.detail);
    });
  });
}

function renderChangePasswordSheet(){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:220;display:flex;align-items:flex-end;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:430px;">
      <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;"></div>
      <div class="sec-lbl">Modifier votre mot de passe</div>
      <div class="field"><label style="font-size:12px;font-weight:700;">Mot de passe actuel</label><input id="pwdCurrent" type="password" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:14px;font-family:inherit;margin-top:5px;"></div>
      <div class="field"><label style="font-size:12px;font-weight:700;">Nouveau mot de passe</label><input id="pwdNew" type="password" placeholder="6 caractères minimum" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:14px;font-family:inherit;margin-top:5px;"></div>
      <div id="pwdErr" style="font-size:11px;color:var(--red);margin-bottom:10px;min-height:14px;"></div>
      <button class="btn-primary" id="pwdSave">Confirmer</button>
    </div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  document.getElementById('pwdSave').addEventListener('click', async () => {
    const current = document.getElementById('pwdCurrent').value;
    const next = document.getElementById('pwdNew').value;
    const err = document.getElementById('pwdErr');
    if(!current || next.length < 6){ err.textContent = 'Mot de passe actuel requis, nouveau de 6 caractères minimum.'; return; }
    const btn = document.getElementById('pwdSave');
    btn.disabled = true; btn.textContent = 'Vérification…';
    const { data: userData } = await sbClient.auth.getUser();
    const email = userData && userData.user ? userData.user.email : null;
    if(!email){ err.textContent = 'Session introuvable, reconnectez-vous.'; btn.disabled=false; btn.textContent='Confirmer'; return; }
    const { error: verifyError } = await sbClient.auth.signInWithPassword({ email, password: current });
    if(verifyError){ err.textContent = 'Mot de passe actuel incorrect.'; btn.disabled=false; btn.textContent='Confirmer'; return; }
    const { error: updateError } = await sbClient.auth.updateUser({ password: next });
    if(updateError){ err.textContent = updateError.message; btn.disabled=false; btn.textContent='Confirmer'; return; }
    err.style.color = 'var(--green)'; err.textContent = '✅ Mot de passe modifié.';
    setTimeout(() => overlay.remove(), 1200);
  });
}

      <div class="bi ${app.tab==='rhome'?'on':''}" data-tab="rhome"><span class="bic">🏠</span>Accueil</div>
      <div class="bi ${app.tab==='mission'?'on':''}" data-tab="mission"><span class="bic">📦</span>Mission</div>
      <div class="bi ${app.tab==='revenus'?'on':''}" data-tab="revenus"><span class="bic">💰</span>Revenus</div>
      <div class="bi" id="navCoursesLivreur"><span class="bic">🛒</span>Courses</div>`;
  }
  n.querySelectorAll('.bi[data-tab]').forEach(el => el.addEventListener('click', () => { app.tab = el.getAttribute('data-tab'); renderApp(); }));
  const nc = document.getElementById('navCourses');
  if(nc) nc.addEventListener('click', switchToClientQuick);
  const ncl = document.getElementById('navCoursesLivreur');
  if(ncl) ncl.addEventListener('click', switchToClientQuick);
}

function renderApp(){
  document.getElementById('aiFloatBtn').style.display = 'flex';
  renderHeader(); renderNav();
  if(app.tab==='home') renderHomeTab();
  else if(app.tab==='search') renderSearchTab();
  else if(app.tab==='cart') renderCartTab();
  else if(app.tab==='delivery') renderClientDeliveryTab();
  else if(app.tab==='profile') renderProfileTab();
  else if(app.tab==='dashboard') renderDashboardTab();
  else if(app.tab==='commandes') renderCommandesTab();
  else if(app.tab==='produits') renderProduitsTab();
  else if(app.tab==='b2b') renderB2BTab();
  else if(app.tab==='rhome') renderLivreurHomeTab();
  else if(app.tab==='mission') renderMissionTab();
  else if(app.tab==='revenus') renderRevenusTab();
  else if(app.tab==='bazar') renderBazarTab();
  else if(app.tab==='demandesFeed') renderDemandesFeedTab();
}

/* ================= VENDEUR — FIL DES DEMANDES NON SATISFAITES (défilement vertical) ================= */
async function renderDemandesFeedTab(){
  const m = document.getElementById('main');
  m.style.padding = '54px 0 30px';
  m.innerHTML = `<div class="empty" style="padding:60px 20px;">Chargement…</div>`;
  const sol = await fetchSolicitationsAll();
  const pending = sol.filter(s => s.status==='en_attente').sort((a,b)=>b.createdAt-a.createdAt);

  const counts = {};
  pending.forEach(s => { counts[s.produit] = (counts[s.produit]||0) + 1; });

  const backBtn = `<button id="feedBack" style="position:fixed;top:14px;left:14px;z-index:10;background:rgba(0,0,0,.4);border:none;color:#fff;border-radius:20px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;">← Retour</button>`;

  if(!pending.length){
    m.innerHTML = `${backBtn}
      <div style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;">
        <span style="font-size:36px;margin-bottom:10px;">🔎</span>
        <div style="font-weight:800;font-size:14px;">Aucune demande non satisfaite pour l'instant</div>
      </div>`;
    document.getElementById('feedBack').addEventListener('click', () => { app.tab='dashboard'; renderApp(); });
    return;
  }

  let html = backBtn + `<div style="background:linear-gradient(180deg,#1E3A5F,#0F1720);color:#fff;">`;
  pending.forEach((s,i) => {
    const count = counts[s.produit];
    html += `
      <div class="demande-card" data-id="${s.id}" style="padding:18px 20px;${i>0?'border-top:1px solid rgba(255,255,255,.1);':''}">
        <div style="display:flex;align-items:center;gap:14px;">
          <span style="font-size:26px;flex-shrink:0;">🔎</span>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Playfair Display',serif;font-weight:800;font-size:15px;">${esc(s.produit)}</div>
            <div style="font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;">${esc(s.clientNom)} · ${esc(s.zone)} · demandé ${count}× · ${new Date(s.createdAt).toLocaleDateString('fr-FR')}</div>
          </div>
        </div>
        <div style="display:flex;gap:6px;margin-top:10px;">
          <input type="number" class="rp-prix" placeholder="Prix" style="width:70px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;border-radius:8px;padding:7px 8px;font-size:11.5px;">
          <input type="number" class="rp-delai" placeholder="Délai h" style="width:60px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;border-radius:8px;padding:7px 8px;font-size:11.5px;">
          <button class="respond-feed-btn" style="flex:1;background:linear-gradient(135deg,var(--green),#059669);border:none;color:#fff;border-radius:8px;font-weight:700;font-size:11px;cursor:pointer;">✅ Répondre</button>
          <button class="add-from-feed-btn" data-produit="${esc(s.produit)}" style="flex-shrink:0;background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff;padding:0 12px;border-radius:8px;font-weight:700;font-size:11px;cursor:pointer;">➕</button>
        </div>
      </div>`;
  });
  html += `</div>`;
  m.innerHTML = html;

  document.getElementById('feedBack').addEventListener('click', () => { app.tab='dashboard'; renderApp(); });
  m.querySelectorAll('.respond-feed-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const card = btn.closest('.demande-card');
      const prix = card.querySelector('.rp-prix').value;
      const delai = card.querySelector('.rp-delai').value;
      if(!prix || !delai){ alert('Renseignez un prix et un délai.'); return; }
      btn.disabled = true; btn.textContent = '...';
      const s = pending.find(p => p.id === card.getAttribute('data-id'));
      if(s) await respondToSolicitation(s, prix, delai);
      renderDemandesFeedTab();
    });
  });
  m.querySelectorAll('.add-from-feed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      app.tab = 'produits';
      renderApp();
      setTimeout(() => {
        const input = document.getElementById('newProduit');
        if(input) input.value = btn.getAttribute('data-produit');
      }, 150);
    });
  });
}

/* ================= CLIENT — RECHERCHE ================= */
async function renderSearchTab(query){
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="sbar"><input id="searchInput" placeholder="Que cherchez-vous ?" value="${esc(query||'')}"><button id="searchBtn">Chercher</button></div>
    <div class="search-hint">📍 Résultats triés par proximité et coût total réel (produit + livraison)</div>
    <div id="searchResults"></div>`;
  document.getElementById('searchBtn').addEventListener('click', () => runSearch());
  document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') runSearch(); });
  if(query) runSearch(query);
  else document.getElementById('searchResults').innerHTML = `<div class="empty fadeUp"><span class="eic">🔍</span>Tapez un produit pour voir les vendeurs disponibles autour de vous.</div>`;
}

async function runSearch(forced){
  const input = document.getElementById('searchInput');
  const q = (forced !== undefined ? forced : input.value).trim();
  if(!q) return;
  const r = document.getElementById('searchResults');
  r.innerHTML = `<div class="empty">Recherche en cours…</div>`;

  const catalogue = await fetchCatalogueAll();
  const matches = catalogue
    .filter(c => c.produit.toLowerCase().includes(q.toLowerCase()) && c.stock > 0)
    .map(c => {
      const sameZone = c.zone.toLowerCase() === app.profile.zone.toLowerCase();
      const livraison = sameZone ? 300 : 900;
      return {...c, livraison, total:Number(c.prix)+livraison, sameZone};
    })
    .sort((a,b)=>a.total-b.total);

  if(matches.length){
    let html = `<div class="sec-lbl">🏆 Meilleures offres pour « ${esc(q)} »</div>`;
    matches.forEach((v,i) => {
      html += `
        <div class="pcard ${i===0?'best':''} fadeUp" style="animation-delay:${i*.05}s;" data-vid="${v.id}">
          <div class="pcard-top">
            ${v.photoUrl ? `<img src="${v.photoUrl}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;margin-right:10px;">` : ''}
            <div><div class="pcard-name">${i===0?'✅ ':''}${esc(v.vendeurNom)}</div><div class="pcard-meta"><span class="local-badge">📍 ${esc(v.zone)}${v.sameZone?' · votre zone':''}</span><span class="trust-badge">🔒 vérifié</span></div></div>
            <div class="pcard-price"><div class="total">${money(v.total)} F</div><div class="detail">${money(v.prix)} + ${money(v.livraison)} liv.</div></div>
          </div>
          ${i===0?'<div class="win-badge">🏆 Offre recommandée Aksina</div>':''}
          <button class="add-cart-btn" data-catid="${v.id}" data-produit="${esc(v.produit)}" data-prix="${v.prix}" data-livraison="${v.livraison}" data-vendeur="${esc(v.vendeurNom)}" data-vendeuruid="${v.vendeurUserId||''}" data-zone="${esc(v.zone)}">🛒 Ajouter au panier</button>
        </div>`;
    });
    r.innerHTML = html;
    r.querySelectorAll('.add-cart-btn').forEach(btn => btn.addEventListener('click', () => addToCart(btn)));
    return;
  }

  r.innerHTML = `

let deliveryMode = 'moto';

async function renderCartTab(){
  const m = document.getElementById('main');

      ${deliveryMode==='moto'?'<span style="color:var(--orange);font-weight:800;">✓</span>':''}
    </div>
    <div class="req-card" id="modeRetrait" style="cursor:pointer;border-color:${deliveryMode==='retrait'?'var(--orange)':'var(--border)'};display:flex;align-items:center;gap:10px;">
      <span style="font-size:20px;">🚶</span><div style="flex:1;"><div style="font-size:12.5px;font-weight:700;">Retrait sur place</div><div style="font-size:10.5px;color:var(--muted);">Chez le vendeur · gratuit</div></div>
      ${deliveryMode==='retrait'?'<span style="color:var(--orange);font-weight:800;">✓</span>':'<span style="color:var(--green);font-weight:800;font-size:11px;">Gratuit</span>'}
    </div>

    <div class="req-card" style="margin-top:14px;display:flex;justify-content:space-between;align-items:center;">
      <div style="font-weight:800;font-size:13px;">Total</div><div style="font-weight:900;font-size:16px;color:var(--orange);">${money(total)} F</div>
    </div>
    <button class="btn-primary" id="confirmOrder" style="margin-top:14px;">Confirmer la commande</button>
    <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.6;">Paiement à la livraison pour l'instant — le paiement en ligne multi-opérateurs arrive dans une prochaine version.</div>`;
  m.innerHTML = html;

  document.getElementById('modeMoto').addEventListener('click', () => { deliveryMode = 'moto'; renderCartTab(); });
  document.getElementById('modeRetrait').addEventListener('click', () => { deliveryMode = 'retrait'; renderCartTab(); });

  document.getElementById('confirmOrder').addEventListener('click', async () => {
    for(const item of cartItems){
      const orderId = uid();
      const liv = deliveryMode === 'retrait' ? 0 : item.livraison;
      const factureNum = await genererNumeroFacture('C2C');
      const ledgerId = crypto.randomUUID ? crypto.randomUUID() : uid()+uid();
      await insertOrder({ id:orderId, clientNom:app.profile.nom, clientUserId:currentUserId, clientZone:app.profile.zone, vendeurNom:item.vendeurNom, vendeurUserId:item.vendeurUserId, vendeurZone:item.zone, produit:item.produit, prix:item.prix, status:'nouvelle', factureNum, ledgerId });
      if(item.catalogueId){
        const catalogue = await fetchCatalogueAll();
        const prod = catalogue.find(c => c.id === item.catalogueId);
        if(prod) await updateCatalogueStock(item.catalogueId, Math.max(0, prod.stock - 1));
      }
      if(deliveryMode !== 'retrait'){
        await insertLivraison({ id:uid(), produit:item.produit, clientNom:app.profile.nom, clientUserId:currentUserId, clientZone:app.profile.zone, vendeurNom:item.vendeurNom, vendeurUserId:item.vendeurUserId, vendeurZone:item.zone, prix:item.prix + liv, status:'a_livrer', livreurNom:null });

    app.tab = 'delivery';
    renderApp();
  });
}

/* ================= NUMÉROTATION DES FACTURES (format AKS-[Pays]-[Année]-[Ville]-[Type]-[Numéro]) ================= */
async function genererNumeroFacture(type){
  const annee = new Date().getFullYear();
  const ville = (app.profile.zone || 'XXX').slice(0,3).toUpperCase();
  const { count } = await sbClient.from('app_orders').select('*', { count:'exact', head:true });
  const numero = String((count||0) + 1).padStart(6,'0');
  return `AKS-SN-${annee}-${ville}-${type}-${numero}`;
}

  const disponibles = all.filter(l=>l.status==='a_livrer').sort((a,b)=>b.createdAt-a.createdAt);
  const mesLivraisons = all.filter(l=>l.status==='en_cours' && l.livreurUserId===currentUserId).sort((a,b)=>b.createdAt-a.createdAt);

  if(!disponibles.length && !mesLivraisons.length){ m.innerHTML = `<div class="empty fadeUp"><span class="eic">🛵</span>Aucune mission pour l'instant.</div>`; return; }

  let html = '';
  if(mesLivraisons.length){
    html += `<div class="sec-lbl">Votre mission en cours</div>`;
    mesLivraisons.forEach(l => {
      html += `<div class="req-card" data-id="${l.id}"><div class="req-obj">🛵 ${esc(l.produit)}</div><div class="pcard-meta" style="margin-bottom:8px;"><span class="local-badge">De ${esc(l.vendeurNom)}</span><span class="local-badge">Vers ${esc(l.clientNom)}, ${esc(l.clientZone)}</span></div><button class="respond-btn deliver-done" style="width:100%;">Marquer comme livré</button></div>`;
    });
  }
  if(disponibles.length){
    html += `<div class="sec-lbl" style="margin-top:16px;">Disponibles dans votre zone</div>`;
    disponibles.forEach((l,i) => {
      const sameZone = l.vendeurZone.toLowerCase()===app.profile.zone.toLowerCase();
      html += `<div class="req-card fadeUp" data-id="${l.id}" style="animation-delay:${i*.05}s;"><div class="req-obj">📦 ${esc(l.produit)}</div><div class="pcard-meta" style="margin-bottom:8px;"><span class="local-badge">De ${esc(l.vendeurNom)}${sameZone?' · votre zone':''}</span><span class="local-badge">Vers ${esc(l.clientZone)}</span></div><button class="respond-btn claim-btn" style="width:100%;">Je prends cette mission</button></div>`;
    });
  }
  m.innerHTML = html;

  m.querySelectorAll('.claim-btn').forEach(btn => btn.addEventListener('click', async () => {
    btn.disabled = true; btn.textContent = '...';
    const id = btn.closest('.req-card').getAttribute('data-id');
    await updateLivraison(id, { status:'en_cours', livreurNom:app.profile.nom, livreurUserId:currentUserId });
    renderMissionTab();
  }));
  m.querySelectorAll('.deliver-done').forEach(btn => btn.addEventListener('click', async () => {
    btn.disabled = true; btn.textContent = '...';
    const id = btn.closest('.req-card').getAttribute('data-id');
    await updateLivraison(id, { status:'livree' });
    renderMissionTab();
  }));
}

/* ================= LIVREUR — REVENUS ================= */
async function renderRevenusTab(){
  const m = document.getElementById('main');
  m.innerHTML = `<div class="empty">Chargement…</div>`;
  const all = await fetchLivraisonsAll();
  const livrees = all.filter(l=>l.status==='livree' && l.livreurUserId===currentUserId).sort((a,b)=>b.createdAt-a.createdAt);
  const total = livrees.length * 500;

  let html = `
    <div class="home-hero fadeUp"><div class="ht">${money(total)} F</div><div class="hs">Revenus estimés · ${livrees.length} livraison${livrees.length>1?'s':''} · 500 F par course</div></div>`;

  else {
    html += `<div class="sec-lbl">Historique</div>`;

  }

/* ================= PROFIL (commun) ================= */
function rekStatus(score){
  if(score >= 90) return {label:'Or', color:'#B8860B'};
  if(score >= 75) return {label:'Argent', color:'#8A8F98'};
  return {label:'Bronze', color:'#B08D57'};
}

/* ================= ASSISTANT IA FLOTTANT (réel, branché sur le catalogue et les demandes) ================= */
let aiInitialized = false;

function initAIAssistant(){
  const btn = document.getElementById('aiFloatBtn');
  const panel = document.getElementById('aiPanel');
  btn.addEventListener('click', () => {
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    if(!isOpen && !aiInitialized){
      addAIMessage("Bonjour ! Dites-moi ce que vous cherchez — je regarde en direct dans le vrai catalogue Aksina, ce n'est pas une réponse préécrite.", 'bot');
      aiInitialized = true;
    }
  });
  document.getElementById('aiPanelClose').addEventListener('click', () => panel.style.display = 'none');
  document.getElementById('aiSend').addEventListener('click', sendAIMessage);
  document.getElementById('aiInput').addEventListener('keydown', e => { if(e.key === 'Enter') sendAIMessage(); });
}

function addAIMessage(text, who){
  const box = document.getElementById('aiMessages');
  const bubble = document.createElement('div');
  bubble.style.cssText = who==='user' ? 'text-align:right;margin-bottom:8px;' : 'margin-bottom:8px;';
  bubble.innerHTML = `<span style="display:inline-block;max-width:85%;padding:8px 11px;border-radius:10px;background:${who==='user'?'#1E3A5F':'#F4F6F8'};color:${who==='user'?'#fff':'#0F1720'};font-size:12px;line-height:1.5;">${text}</span>`;
  box.appendChild(bubble);
  box.scrollTop = box.scrollHeight;
}

async function sendAIMessage(){
  const input = document.getElementById('aiInput');
  const q = input.value.trim();
  if(!q) return;
  addAIMessage(esc(q), 'user');
  input.value = '';

  const catalogue = await fetchCatalogueAll();
  const matches = catalogue.filter(c => c.produit.toLowerCase().includes(q.toLowerCase()) && c.stock > 0);

  if(matches.length){
    const best = matches.sort((a,b) => Number(a.prix)-Number(b.prix))[0];
    addAIMessage(`J'ai trouvé <b>${esc(best.produit)}</b> chez ${esc(best.vendeurNom)} (${esc(best.zone)}) à <b>${money(best.prix)} F</b>. J'ouvre la recherche pour vous.`, 'bot');
    setTimeout(() => {
      document.getElementById('aiPanel').style.display = 'none';
      if(app.role === 'client'){ app.tab = 'search'; renderApp(); setTimeout(() => runSearch(q), 150); }
    }, 1000);
  } else if(app.role === 'client'){
    addAIMessage(`Personne ne propose « ${esc(q)} » pour l'instant près de vous. J'envoie une demande réelle aux vendeurs de votre zone via One Seek AI.`, 'bot');
    setTimeout(() => { document.getElementById('aiPanel').style.display = 'none'; sendRequest(q); }, 1200);
  } else {
    addAIMessage(`Aucun résultat pour « ${esc(q)} » dans le catalogue actuel.`, 'bot');
  }
}

initAIAssistant();
boot();
</script>
