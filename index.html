<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aksina</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap');
  :root{
    --orange:#E8431A;--orange2:#F97316;--gold:#FBBF24;
    --navy:#1E3A5F;--blue:#2563EB;--green:#10B981;--red:#EF4444;--purple:#7C3AED;
    --ink:#0F1720;--muted:#5B6B7A;--border:#E4E9EE;--panel:#FFFFFF;--page:#F7F8FA;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:'Inter',sans-serif;background:#0d1420;color:var(--ink);display:flex;justify-content:center;padding:0;}
  .app{width:100%;max-width:430px;min-height:100vh;background:var(--page);display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.4);position:relative;}

  @keyframes gpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .fadeUp{animation:fadeUp .35s ease both;}

  /* SPLASH */
  .splash{min-height:100vh;background:radial-gradient(circle at 50% 0%,#24406b,#0f1c33 55%,#0a1424);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;color:#fff;text-align:center;}
  .splash-icon{width:78px;height:78px;border-radius:24px;background:linear-gradient(135deg,var(--orange),var(--gold));display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 18px 40px rgba(232,67,26,.4);margin-bottom:18px;}
  .splash-name{font-family:'Playfair Display',serif;font-size:46px;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
  .splash-tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:14px;}
  .splash-desc{font-size:13px;color:rgba(255,255,255,.65);max-width:280px;line-height:1.7;margin-bottom:44px;}
  .splash-btn{width:100%;max-width:280px;background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff;font-size:15px;font-weight:700;padding:16px 28px;border-radius:30px;cursor:pointer;box-shadow:0 10px 26px rgba(232,67,26,.45);}

  /* ROLE PICK */
  .rolepick{min-height:100vh;background:linear-gradient(180deg,#0f1c33,#141d2c 30%,var(--page) 30%);padding:20px 20px 40px;}
  .rp-hdr{color:#fff;text-align:center;padding:20px 0 26px;}
  .rp-hdr .t{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;}
  .rp-hdr .s{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;}
  .role-card{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;cursor:pointer;box-shadow:0 10px 30px rgba(15,23,32,.08);border:2px solid transparent;transition:.15s;display:flex;align-items:center;gap:16px;}
  .role-card:active{transform:scale(.98);}
  .role-card .ic{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  .role-card.rc-client .ic{background:linear-gradient(135deg,#DBEAFE,#BFDBFE);}
  .role-card.rc-vendeur .ic{background:linear-gradient(135deg,#FEF3C7,#FDE68A);}
  .role-card.rc-livreur .ic{background:linear-gradient(135deg,#DCFCE7,#BBF7D0);}
  .role-card .rt{font-size:15px;font-weight:800;color:var(--ink);}
  .role-card .rd{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .role-card .arrow{margin-left:auto;color:var(--orange);font-size:18px;}

  /* ONBOARDING */
  .onb-form{min-height:100vh;background:var(--page);padding:0;}
  .onb-hero{background:linear-gradient(135deg,var(--navy),var(--blue));padding:40px 24px 30px;color:#fff;text-align:center;}
  .onb-hero .oi{font-size:34px;margin-bottom:8px;}
  .onb-hero .ot{font-family:'Playfair Display',serif;font-size:19px;font-weight:800;}
  .onb-body{padding:24px 22px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;color:var(--ink);}
  .field input{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:12px;font-size:14.5px;font-family:inherit;background:#fff;}
  .field input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,67,26,.1);}
  .btn-primary{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff;padding:15px;border-radius:14px;font-weight:800;font-size:14.5px;cursor:pointer;box-shadow:0 10px 24px rgba(232,67,26,.3);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
  .btn-ghost{width:100%;background:none;border:none;color:var(--muted);padding:13px;font-weight:600;font-size:13px;cursor:pointer;}

  /* HEADER */
  .hdr{background:linear-gradient(135deg,var(--navy),var(--blue));padding:16px 18px 14px;color:#fff;flex-shrink:0;position:relative;overflow:hidden;}
  .hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(232,67,26,.35),transparent 70%);}
  .hdr-row{display:flex;justify-content:space-between;align-items:center;position:relative;}
  .logo{font-family:'Playfair Display',serif;font-weight:900;font-size:21px;}
  .role-badge{font-size:10.5px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.15);}
  .geo-line{display:flex;align-items:center;gap:6px;margin-top:9px;position:relative;}
  .gdot{width:7px;height:7px;border-radius:50%;background:#4ADE80;animation:gpulse 1.6s ease-in-out infinite;flex-shrink:0;}
  .geo-txt{font-size:11px;font-weight:700;color:#BBF7D0;}
  .geo-sub{font-size:10px;color:rgba(255,255,255,.5);}

  .main{flex:1;overflow-y:auto;padding:16px 16px 92px;}

  /* GENERIC CARDS */
  .sbar{display:flex;gap:8px;margin-bottom:6px;background:#fff;border-radius:14px;padding:4px;box-shadow:0 4px 14px rgba(15,23,32,.06);border:1px solid var(--border);}
  .sbar input{flex:1;padding:11px 12px;border:none;font-size:14.5px;font-family:inherit;background:transparent;}
  .sbar input:focus{outline:none;}
  .sbar button{background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff;padding:0 18px;border-radius:11px;font-weight:700;font-size:13px;cursor:pointer;}
  .search-hint{font-size:10.5px;color:var(--muted);margin:8px 2px 16px;line-height:1.6;}
  .sec-lbl{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:4px 0 10px;}

  .pcard{background:#fff;border-radius:16px;padding:14px 15px;margin-bottom:11px;box-shadow:0 3px 12px rgba(15,23,32,.05);border:1.5px solid var(--border);position:relative;}
  .pcard.best{border-color:rgba(16,185,129,.45);background:linear-gradient(180deg,rgba(16,185,129,.04),#fff 40%);}
  .pcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .pcard-name{font-size:14px;font-weight:800;}
  .pcard-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .local-badge{font-size:10px;color:var(--muted);background:var(--page);border:1px solid var(--border);padding:2px 8px;border-radius:10px;}
  .trust-badge{font-size:10px;font-weight:700;color:var(--green);background:rgba(16,185,129,.1);padding:2px 8px;border-radius:10px;}
  .pcard-price{text-align:right;flex-shrink:0;}
  .pcard-price .total{font-size:16px;font-weight:900;color:var(--orange);}
  .pcard-price .detail{font-size:9.5px;color:var(--muted);margin-top:1px;}
  .win-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--green),#059669);padding:4px 10px;border-radius:9px;margin-top:9px;}
  .add-cart-btn{width:100%;margin-top:10px;background:var(--navy);border:none;color:#fff;padding:9px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;}

  .empty{text-align:center;padding:44px 16px;color:var(--muted);font-size:13px;line-height:1.7;}
  .empty .eic{font-size:34px;margin-bottom:10px;display:block;}

  .seek-box{background:linear-gradient(135deg,rgba(37,99,235,.08),rgba(124,58,237,.04));border:1.5px solid rgba(37,99,235,.2);border-radius:18px;padding:20px 18px;text-align:center;margin-top:6px;}
  .seek-box .si{font-size:28px;margin-bottom:8px;}
  .seek-box h4{font-family:'Playfair Display',serif;font-size:16px;margin:0 0 6px;}
  .seek-box p{font-size:12px;color:var(--ink);opacity:.7;line-height:1.6;margin:0 0 16px;}

  .req-card{background:#fff;border-radius:16px;padding:14px 15px;margin-bottom:12px;box-shadow:0 3px 12px rgba(15,23,32,.05);border:1px solid var(--border);}
  .req-obj{font-size:14px;font-weight:800;margin-bottom:8px;}
  .status-line{display:flex;align-items:center;gap:9px;background:var(--page);border-radius:11px;padding:10px 13px;}
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .status-dot.wait{background:var(--orange);animation:gpulse 1.5s ease-in-out infinite;}
  .status-dot.mid{background:var(--blue);animation:gpulse 1.5s ease-in-out infinite;}
  .status-dot.done{background:var(--green);}
  .status-txt{font-size:12px;font-weight:700;flex:1;}
  .status-time{font-size:10px;color:var(--muted);}
  .resp-box{background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(16,185,129,.03));border-radius:12px;padding:11px 13px;margin-top:10px;}
  .resp-box .n{font-size:13px;font-weight:800;color:#059669;}
  .resp-box .m{font-size:11.5px;color:var(--ink);opacity:.75;margin-top:3px;}

  .tech-toggle{font-size:10.5px;color:var(--muted);text-align:center;margin-top:16px;cursor:pointer;}
  .tech-box{background:var(--ink);color:#F4F6F8;border-radius:12px;padding:13px 14px;margin-top:10px;font-family:monospace;font-size:10px;line-height:1.8;display:none;}
  .tech-box.show{display:block;}

  .respond-form{display:flex;gap:7px;margin-top:11px;}
  .respond-form input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:9px 10px;font-size:12.5px;font-family:inherit;background:var(--page);}
  .respond-form input:focus{outline:none;border-color:var(--orange);}
  .respond-btn{background:linear-gradient(135deg,var(--navy),var(--blue));border:none;color:#fff;border-radius:10px;padding:0 14px;font-size:12.5px;font-weight:800;cursor:pointer;}

  .catalog-item{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:9px;box-shadow:0 2px 8px rgba(15,23,32,.04);}
  .catalog-item .cn{font-size:13.5px;font-weight:700;}
  .catalog-item .cz{font-size:10.5px;color:var(--muted);margin-top:2px;}
  .catalog-item .cp{font-size:14px;font-weight:800;color:var(--orange);}
  .add-form{display:flex;gap:7px;margin-bottom:18px;background:#fff;border-radius:14px;padding:5px;box-shadow:0 3px 12px rgba(15,23,32,.05);border:1px solid var(--border);}
  .add-form input{flex:1;border:none;padding:9px 10px;font-size:13px;font-family:inherit;background:transparent;}
  .add-form input:focus{outline:none;}
  .add-form button{background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff;border-radius:10px;padding:0 16px;font-weight:800;font-size:17px;cursor:pointer;}

  .profile-box{text-align:center;padding:26px 0 10px;}
  .profile-avatar{width:76px;height:76px;border-radius:24px;background:linear-gradient(135deg,var(--orange),var(--gold));display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:900;margin:0 auto 14px;box-shadow:0 12px 26px rgba(232,67,26,.3);}
  .profile-name{font-size:18px;font-weight:800;}
  .profile-meta{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .profile-role-tag{display:inline-block;margin-top:10px;font-size:11px;font-weight:800;background:#fff;border:1px solid var(--border);padding:6px 14px;border-radius:20px;}
  .profile-stats{display:flex;gap:10px;margin:22px 0;}
  .pstat{flex:1;background:#fff;border-radius:14px;padding:14px 8px;text-align:center;border:1px solid var(--border);}
  .pstat .num{font-size:20px;font-weight:900;color:var(--orange);}
  .pstat .lbl{font-size:9.5px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;}

  /* DASHBOARD (vendeur) */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .kpi{background:#fff;border-radius:16px;padding:16px;border:1px solid var(--border);box-shadow:0 3px 12px rgba(15,23,32,.05);}
  .kpi .kv{font-size:24px;font-weight:900;color:var(--navy);}
  .kpi .kl{font-size:10.5px;color:var(--muted);margin-top:4px;}
  .kpi.hot .kv{color:var(--orange);}

  .home-hero{background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:18px;padding:20px;color:#fff;margin-bottom:16px;}
  .home-hero .ht{font-family:'Playfair Display',serif;font-size:17px;font-weight:800;margin-bottom:4px;}
  .home-hero .hs{font-size:11.5px;color:rgba(255,255,255,.7);line-height:1.6;}

  .b2b-box{text-align:center;padding:50px 20px;}
  .b2b-box .bi2{font-size:40px;margin-bottom:14px;}
  .b2b-box h3{font-family:'Playfair Display',serif;font-size:18px;margin:0 0 8px;}
  .b2b-box p{font-size:12.5px;color:var(--muted);line-height:1.7;max-width:280px;margin:0 auto;}

  /* NAV */
  .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 10px;box-shadow:0 -6px 20px rgba(15,23,32,.06);}
  .bi{flex:1;text-align:center;padding:5px 0;font-size:9.5px;color:var(--muted);cursor:pointer;font-weight:700;}
  .bi .bic{font-size:19px;display:block;margin-bottom:3px;position:relative;}
  .bi.on{color:var(--orange);}
  .navbadge{position:absolute;top:-4px;right:calc(50% - 16px);background:var(--red);color:#fff;font-size:8px;font-weight:800;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div class="app">
  <div id="hdr"></div>
  <div id="main"></div>
  <div id="bnav" class="bnav" style="display:none;"></div>
  <div id="aiFloatBtn" style="display:none;position:fixed;bottom:76px;right:20px;width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#60A5FA,#1E3A5F);box-shadow:0 4px 14px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:80;border:2px solid rgba(255,255,255,.4);">
    <span style="font-size:11px;font-weight:900;color:#fff;">AKS</span>
  </div>
  <div id="aiPanel" style="display:none;position:fixed;bottom:76px;right:20px;left:20px;max-width:390px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.25);z-index:90;overflow:hidden;">
    <div style="background:linear-gradient(135deg,#1E3A5F,#2563EB);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;">
      <div style="color:#fff;font-size:12.5px;font-weight:800;">🤖 Assistant Aksina</div>
      <button id="aiPanelClose" style="background:none;border:none;color:#fff;font-size:16px;cursor:pointer;">✕</button>
    </div>
    <div id="aiMessages" style="max-height:280px;overflow-y:auto;padding:12px 14px;font-size:12.5px;"></div>
    <div style="display:flex;gap:7px;padding:10px 12px;border-top:1px solid #eee;">
      <input id="aiInput" placeholder="Que cherchez-vous ?" style="flex:1;border:1.5px solid #E4E9EE;border-radius:9px;padding:9px 11px;font-size:12.5px;font-family:inherit;">
      <button id="aiSend" style="background:#E8431A;border:none;color:#fff;border-radius:9px;padding:0 14px;font-weight:700;cursor:pointer;">→</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = 'https://yoqxqdrffihtampxrmqc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oiaGH8-CzwO6WCAc7gP4zA_YXW0qs_G';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUserId = null;

async function ensureAuth(){
  try{
    const { data: sessionData } = await sbClient.auth.getSession();
    if(sessionData && sessionData.session){ currentUserId = sessionData.session.user.id; return true; }
    const { data, error } = await sbClient.auth.signInAnonymously();
    if(error) throw error;
    currentUserId = data.user.id;
    return true;
  } catch(e){
    console.error('Auth anonyme indisponible', e);
    currentUserId = 'local-' + Math.random().toString(36).slice(2,10);
    notifyOfflineMode('auth');
    return false;
  }
}

let offlineNoticeShown = false;
function notifyOfflineMode(reason){
  if(offlineNoticeShown) return;
  offlineNoticeShown = true;
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:80px;left:16px;right:16px;max-width:398px;margin:0 auto;background:#8A5A0F;color:#fff;padding:11px 14px;border-radius:11px;font-size:11.5px;line-height:1.5;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,.3);';
  toast.textContent = reason === 'auth'
    ? "Connexion au compte impossible (l'inscription anonyme est peut-être désactivée dans Supabase → Authentication → Providers). Vos données ne seront pas partagées entre appareils tant que ce n'est pas activé."
    : "La base de données n'a pas répondu correctement à une action. Vérifiez la connexion internet — certaines données peuvent ne pas être enregistrées.";
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 7000);
}

/* ---- lecture générique d'une table (retourne toutes les lignes, tri chronologique) ---- */
async function fetchAll(table){
  const { data, error } = await sbClient.from(table).select('*').order('created_at', { ascending: true });
  if(error){ console.error(error); notifyOfflineMode('db'); return []; }
  return data;
}

/* ---- mappers snake_case (base) <-> camelCase (application) ---- */
function mapCatalogue(r){ return { id:r.id, vendeurNom:r.vendeur_nom, zone:r.zone, produit:r.produit, prix:Number(r.prix), createdAt:new Date(r.created_at).getTime() }; }
function mapSolicitation(r){ return { id:r.id, clientNom:r.client_nom, zone:r.zone, produit:r.produit, quantite:r.quantite, status:r.status, reponse:r.reponse, createdAt:new Date(r.created_at).getTime() }; }
function mapOrder(r){ return { id:r.id, clientNom:r.client_nom, clientZone:r.client_zone, vendeurNom:r.vendeur_nom, vendeurZone:r.vendeur_zone, produit:r.produit, prix:Number(r.prix), status:r.status, createdAt:new Date(r.created_at).getTime() }; }
function mapLivraison(r){ return { id:r.id, produit:r.produit, clientNom:r.client_nom, clientZone:r.client_zone, vendeurNom:r.vendeur_nom, vendeurZone:r.vendeur_zone, prix:Number(r.prix), status:r.status, livreurNom:r.livreur_nom, createdAt:new Date(r.created_at).getTime() }; }
function mapBazar(r){ return { id:r.id, titre:r.titre, prix:Number(r.prix), auteur:r.auteur, zone:r.zone, createdAt:new Date(r.created_at).getTime() }; }

async function fetchCatalogueAll(){ return (await fetchAll('app_catalogue')).map(mapCatalogue); }
async function insertCatalogue(item){ const { error } = await sbClient.from('app_catalogue').insert({ id:item.id, vendeur_nom:item.vendeurNom, zone:item.zone, produit:item.produit, prix:item.prix }); if(error){ console.error(error); notifyOfflineMode('db'); } }

async function fetchSolicitationsAll(){ return (await fetchAll('app_solicitations')).map(mapSolicitation); }
async function insertSolicitation(item){ const { error } = await sbClient.from('app_solicitations').insert({ id:item.id, client_nom:item.clientNom, zone:item.zone, produit:item.produit, quantite:item.quantite, status:item.status }); if(error){ console.error(error); notifyOfflineMode('db'); } }
async function updateSolicitation(id, patch){
  const dbPatch = {};
  if('status' in patch) dbPatch.status = patch.status;
  if('reponse' in patch) dbPatch.reponse = patch.reponse;
  const { error } = await sbClient.from('app_solicitations').update(dbPatch).eq('id', id);
  if(error){ console.error(error); notifyOfflineMode('db'); }
}

async function fetchOrdersAll(){ return (await fetchAll('app_orders')).map(mapOrder); }
async function insertOrder(item){ const { error } = await sbClient.from('app_orders').insert({ id:item.id, client_nom:item.clientNom, client_zone:item.clientZone, vendeur_nom:item.vendeurNom, vendeur_zone:item.vendeurZone, produit:item.produit, prix:item.prix, status:item.status }); if(error){ console.error(error); notifyOfflineMode('db'); } }

async function fetchLivraisonsAll(){ return (await fetchAll('app_livraisons')).map(mapLivraison); }

async function getMyProfile(role){
  const { data, error } = await sbClient.from('app_profiles').select('*').eq('user_id', currentUserId).eq('role', role).maybeSingle();
  if(error){ console.error(error); return null; }
  return data ? { nom:data.nom, zone:data.zone } : null;
}
async function saveMyProfile(role, nom, zone){
  const { error } = await sbClient.from('app_profiles').upsert({ user_id:currentUserId, role, nom, zone }, { onConflict:'user_id,role' });
  if(error){ console.error(error); notifyOfflineMode('db'); }
}
async function getExistingRoles(){
  const { data, error } = await sbClient.from('app_profiles').select('role').eq('user_id', currentUserId);
  if(error) return [];
  return data.map(r=>r.role);
}
async function getActiveRoleDb(){
  const { data, error } = await sbClient.from('app_sessions').select('active_role').eq('user_id', currentUserId).maybeSingle();
  if(error) return null;
  return data ? data.active_role : null;
}
async function setActiveRoleDb(role){

}

/* ================= TEMPS RÉEL ================= */
function setupRealtime(){
  sbClient.channel('aksina-realtime')
    .on('postgres_changes', { event:'*', schema:'public', table:'app_catalogue' }, () => { if(['home','search','produits','dashboard'].includes(app.tab)) renderApp(); })
    .on('postgres_changes', { event:'*', schema:'public', table:'app_solicitations' }, () => { if(['home','delivery','commandes','dashboard','profile'].includes(app.tab)) renderApp(); })
    .on('postgres_changes', { event:'*', schema:'public', table:'app_orders' }, () => { if(['commandes','dashboard','profile'].includes(app.tab)) renderApp(); })
    .on('postgres_changes', { event:'*', schema:'public', table:'app_livraisons' }, () => { if(['delivery','mission','rhome','revenus','commandes','profile'].includes(app.tab)) renderApp(); })
    .subscribe();
}

/* ================= BOOT ================= */
async function boot(){
  await ensureAuth();

  app.tab = activeRole === 'client' ? 'home' : (activeRole === 'vendeur' ? 'dashboard' : 'rhome');
  renderApp();
}

function runAutoGeo(manual){
  const status = document.getElementById('geoStatus');
  const zoneInput = document.getElementById('obZone');
  if(!navigator.geolocation){ status.textContent = manual ? 'Géolocalisation non disponible sur cet appareil.' : ''; return; }
  status.textContent = '📡 Détection automatique de votre position…';
  navigator.geolocation.getCurrentPosition(async (pos) => {
    try{
      const {latitude, longitude} = pos.coords;
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=14&addressdetails=1`);
      const data = await res.json();
      const a = data.address || {};
      const zoneName = a.suburb || a.neighbourhood || a.town || a.city || a.county || data.display_name;
      zoneInput.value = zoneName;
      status.textContent = '✅ Position détectée automatiquement — modifiable si besoin.';
    } catch(e){ status.textContent = "Détection automatique impossible. Vous pouvez entrer votre zone manuellement."; }
  }, () => {
    status.textContent = manual ? 'Accès à la position refusé.' : "Détection automatique refusée. Entrez votre zone manuellement, ou autorisez la position et réessayez.";
  });
}

async function loadTrendAndBadges(){
  const sol = await fetchSolicitationsAll();
  const counts = {};
  sol.forEach(s => { counts[s.produit] = (counts[s.produit]||0) + 1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const t1 = document.getElementById('trendLine1');
  const t2 = document.getElementById('trendLine2');
  if(t1){
    if(sorted.length){
      t1.textContent = `${sorted[0][1]} recherche${sorted[0][1]>1?'s':''} pour ${sorted[0][0]}`;
      t2.textContent = `à ${app.profile.zone} récemment`;
    } else {
      t1.textContent = 'Aucune tendance pour le moment';
      t2.textContent = 'Lancez une recherche pour la première';
    }
  }

  let badgeCount = 0;
  if(app.role === 'client'){
    badgeCount = sol.filter(s => s.clientNom===app.profile.nom && s.status==='en_attente').length;
  } else if(app.role === 'vendeur'){
    badgeCount = sol.filter(s=>s.status==='en_attente').length;
  } else {
    const livs = await fetchLivraisonsAll();
    badgeCount = livs.filter(l=>l.status==='a_livrer').length;
  }
  const badge = document.getElementById('bellBadge');
  if(badge){
    if(badgeCount > 0){ badge.style.display='flex'; badge.textContent = badgeCount > 9 ? '9+' : badgeCount; }
    else badge.style.display = 'none';
  }
}

async function renderBazarTab(){
  const m = document.getElementById('main');
  m.innerHTML = `<div class="empty">Chargement…</div>`;
  const all = await fetchBazarAll();
  const zoneItems = all.filter(b => b.zone.toLowerCase()===app.profile.zone.toLowerCase()).sort((a,b)=>b.createdAt-a.createdAt);

  let html = `
    <button id="bazarBack" style="background:none;border:none;color:var(--navy);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;">← Retour</button>

      <button id="bazarAddBtn">+</button>
    </div>
    <div class="sec-lbl" style="margin-top:14px;">Près de chez vous · ${esc(app.profile.zone)}</div>`;

  if(!zoneItems.length){
    html += `<div class="empty fadeUp"><span class="eic">🛍️</span>Aucune annonce dans votre zone pour l'instant. Soyez le premier à publier.</div>`;

/* ================= CLIENT — RECHERCHE ================= */
async function renderSearchTab(query){
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="sbar"><input id="searchInput" placeholder="Que cherchez-vous ?" value="${esc(query||'')}"><button id="searchBtn">Chercher</button></div>
    <div class="search-hint">📍 Résultats triés par proximité et coût total réel (produit + livraison)</div>
    <div id="searchResults"></div>`;
  document.getElementById('searchBtn').addEventListener('click', () => runSearch());
  document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') runSearch(); });
  if(query) runSearch(query);
  else document.getElementById('searchResults').innerHTML = `<div class="empty fadeUp"><span class="eic">🔍</span>Tapez un produit pour voir les vendeurs disponibles autour de vous.</div>`;
}

async function runSearch(forced){
  const input = document.getElementById('searchInput');
  const q = (forced !== undefined ? forced : input.value).trim();
  if(!q) return;
  const r = document.getElementById('searchResults');
  r.innerHTML = `<div class="empty">Recherche en cours…</div>`;

  const catalogue = await fetchCatalogueAll();
  const matches = catalogue
    .filter(c => c.produit.toLowerCase().includes(q.toLowerCase()))
    .map(c => {
      const sameZone = c.zone.toLowerCase() === app.profile.zone.toLowerCase();
      const livraison = sameZone ? 1000 : 3000;
      return {...c, livraison, total:Number(c.prix)+livraison, sameZone};
    })
    .sort((a,b)=>a.total-b.total);

  if(matches.length){
    let html = `<div class="sec-lbl">🏆 Meilleures offres pour « ${esc(q)} »</div>`;
    matches.forEach((v,i) => {
      html += `
        <div class="pcard ${i===0?'best':''} fadeUp" style="animation-delay:${i*.05}s;" data-vid="${v.id}">
          <div class="pcard-top">
            <div><div class="pcard-name">${i===0?'✅ ':''}${esc(v.vendeurNom)}</div><div class="pcard-meta"><span class="local-badge">📍 ${esc(v.zone)}${v.sameZone?' · votre zone':''}</span><span class="trust-badge">🔒 vérifié</span></div></div>
            <div class="pcard-price"><div class="total">${money(v.total)} F</div><div class="detail">${money(v.prix)} + ${money(v.livraison)} liv.</div></div>
          </div>
          ${i===0?'<div class="win-badge">🏆 Offre recommandée Aksina</div>':''}
          <button class="add-cart-btn" data-produit="${esc(v.produit)}" data-prix="${v.prix}" data-vendeur="${esc(v.vendeurNom)}" data-zone="${esc(v.zone)}">🛒 Ajouter au panier</button>
        </div>`;
    });
    r.innerHTML = html;
    r.querySelectorAll('.add-cart-btn').forEach(btn => btn.addEventListener('click', () => addToCart(btn)));
    return;
  }

  r.innerHTML = `
    <div class="empty fadeUp"><span class="eic">😕</span>Aucun vendeur ne propose <b>« ${esc(q)} »</b> pour l'instant.</div>
    <div class="seek-box fadeUp"><div class="si">🔎</div><h4>One Seek AI</h4><p>Envoyez votre demande aux vendeurs de votre zone. Vous serez averti dès qu'un vendeur peut vous fournir ce produit.</p><button class="btn-primary" id="sendReq">Envoyer ma demande</button></div>`;
  document.getElementById('sendReq').addEventListener('click', () => sendRequest(q));
}

function addToCart(btn){
  cartItems.push({ id:uid(), produit:btn.dataset.produit, prix:Number(btn.dataset.prix), vendeurNom:btn.dataset.vendeur, zone:btn.dataset.zone });
  btn.textContent = '✓ Ajouté au panier';
  btn.disabled = true;
}

async function sendRequest(produit){
  const sol = { id:uid(), clientNom:app.profile.nom, zone:app.profile.zone, produit, quantite:1, status:'en_attente' };
  await insertSolicitation(sol);
  app.tab = 'delivery';
  renderApp();
}

    const totalDepense = resolved.reduce((s,r)=>s+Number(r.reponse.prix),0);
    statsHtml = `<div class="profile-stats"><div class="pstat"><div class="num">${mine.length}</div><div class="lbl">Demandes</div></div><div class="pstat"><div class="num">${resolved.length}</div><div class="lbl">Résolues</div></div><div class="pstat"><div class="num">${money(totalDepense)} F</div><div class="lbl">Dépensé</div></div></div>`;

    const recent = mine.slice(0,4);
    extraHtml = `<div class="sec-lbl">Mes dernières demandes</div>`;
    if(!recent.length){ extraHtml += `<div class="empty" style="padding:20px;">Aucune demande pour l'instant.</div>`; }
    else recent.forEach(s => {
      extraHtml += `<div class="catalog-item"><div><div class="cn">${esc(s.produit)}</div><div class="cz">${s.status==='repondu' ? '✅ Résolue' : '⏳ En attente'}</div></div>${s.status==='repondu' ? `<div class="cp">${money(s.reponse.prix)} F</div>` : ''}</div>`;
    });

  } else if(app.role === 'vendeur'){
    const catalogue = await fetchCatalogueAll();
    const mine = catalogue.filter(c=>c.vendeurNom===app.profile.nom);
    const orders = await fetchOrdersAll();
    const myOrders = orders.filter(o=>o.vendeurNom===app.profile.nom).sort((a,b)=>b.createdAt-a.createdAt);
    successCount = myOrders.length;
    const ca = myOrders.reduce((s,o)=>s+Number(o.prix),0);
    statsHtml = `<div class="profile-stats"><div class="pstat"><div class="num">${mine.length}</div><div class="lbl">Produits</div></div><div class="pstat"><div class="num">${myOrders.length}</div><div class="lbl">Commandes</div></div><div class="pstat"><div class="num">${money(ca)} F</div><div class="lbl">CA total</div></div></div>`;

    extraHtml = `<div class="sec-lbl">📄 Mes factures (One Invoice)</div>`;
    if(!myOrders.length){ extraHtml += `<div class="empty" style="padding:20px;">Aucune facture pour l'instant — elles apparaissent dès votre première commande.</div>`; }
    else myOrders.slice(0,6).forEach((o,i) => {
      const ref = `AKS-${new Date(o.createdAt).getFullYear()}-${String(o.createdAt).slice(-6)}`;
      extraHtml += `
        <div class="catalog-item" style="align-items:flex-start;">
          <div>
            <div class="cn" style="font-family:monospace;font-size:11px;">${ref}</div>
            <div class="cz">${esc(o.produit)} · ${esc(o.clientNom)} · ${new Date(o.createdAt).toLocaleDateString('fr-FR')}</div>
          </div>
          <div class="cp">${money(o.prix)} F</div>
        </div>`;
    });
    extraHtml += `
      <div class="sec-lbl" style="margin-top:14px;">Accès rapide à mes bases</div>
      <button class="btn-ghost" id="goDashFromProfile" style="border:1.5px solid var(--border);text-align:left;padding:11px 13px;border-radius:11px;margin-bottom:8px;">📊 Tableau de bord complet</button>
      <button class="btn-ghost" id="goCatFromProfile" style="border:1.5px solid var(--border);text-align:left;padding:11px 13px;border-radius:11px;">🗂️ Mon catalogue complet</button>`;

  } else {
    const livs = await fetchLivraisonsAll();
    const mine = livs.filter(l=>l.livreurNom===app.profile.nom).sort((a,b)=>b.createdAt-a.createdAt);
    const done = mine.filter(l=>l.status==='livree');
    successCount = done.length;
    const revenus = done.length * 500;
    statsHtml = `<div class="profile-stats"><div class="pstat"><div class="num">${mine.length}</div><div class="lbl">Prises en charge</div></div><div class="pstat"><div class="num">${done.length}</div><div class="lbl">Livrées</div></div><div class="pstat"><div class="num">${money(revenus)} F</div><div class="lbl">Revenus</div></div></div>`;

    extraHtml = `<div class="sec-lbl">📦 Historique de mes livraisons</div>`;
    if(!mine.length){ extraHtml += `<div class="empty" style="padding:20px;">Aucune livraison pour l'instant.</div>`; }
    else mine.slice(0,6).forEach(l => {
      extraHtml += `<div class="catalog-item"><div><div class="cn">${esc(l.produit)}</div><div class="cz">${esc(l.clientZone)} · ${l.status==='livree'?'✅ Livré':'🛵 En cours'}</div></div>${l.status==='livree' ? '<div class="cp">+500 F</div>' : ''}</div>`;
    });
  }

  const score = Math.min(99, 65 + successCount*4);
  const rek = rekStatus(score);
  const roleLabel = app.role==='client' ? '🧑 Client' : (app.role==='vendeur' ? '🏪 Vendeur' : '🛵 Livreur');

  const allRoles = ['client','vendeur','livreur'];
  const roleLabels = { client:'🧑 Client', vendeur:'🏪 Vendeur / Prestataire', livreur:'🛵 Livreur' };
  const existingRoles = await getExistingRoles();
  const otherExisting = existingRoles.filter(r => r !== app.role);
  const missingRoles = allRoles.filter(r => !existingRoles.includes(r));

  let profilesHtml = '';
  if(otherExisting.length){
    profilesHtml += `<div class="sec-lbl" style="margin-top:16px;">Mes autres profils</div>`;
    otherExisting.forEach(r => {
      profilesHtml += `<button class="btn-ghost switch-role-btn" data-role="${r}" style="border:1.5px solid var(--border);text-align:left;padding:11px 13px;border-radius:11px;margin-bottom:8px;width:100%;">${roleLabels[r]} — passer sur ce profil</button>`;
    });
  }
  if(missingRoles.length){
    profilesHtml += `<div class="sec-lbl" style="margin-top:16px;">Ajouter un profil (${existingRoles.length}/3)</div>`;
    missingRoles.forEach(r => {
      profilesHtml += `<button class="btn-ghost add-role-btn" data-role="${r}" style="border:1.5px dashed var(--orange);color:var(--orange);font-weight:700;text-align:left;padding:11px 13px;border-radius:11px;margin-bottom:8px;width:100%;">+ Devenir ${roleLabels[r]}</button>`;
    });
  }

  m.innerHTML = `
    <div class="profile-box">
      <div class="profile-avatar">${initials}</div>
      <div class="profile-name">${esc(app.profile.nom)}</div>
      <div class="profile-meta">📍 ${esc(app.profile.zone)}</div>
      <div class="profile-role-tag">${roleLabel}</div>
    </div>
    <div class="req-card" style="text-align:center;">
      <div class="sec-lbl" style="margin-bottom:8px;">Statut One Rek</div>
      <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:${rek.color};">${rek.label}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;">Score de confiance : ${score}/100 — basé sur votre activité réelle</div>
    </div>
    ${statsHtml}
    ${extraHtml}
    ${profilesHtml}`;

  m.querySelectorAll('.switch-role-btn').forEach(btn => btn.addEventListener('click', async () => {
    const r = btn.getAttribute('data-role');
    const p = await getMyProfile(r);
    await setActiveRoleDb(r);
    app.role = r; app.profile = p;
    app.tab = r==='client' ? 'home' : (r==='vendeur' ? 'dashboard' : 'rhome');
    renderApp();
  }));
  m.querySelectorAll('.add-role-btn').forEach(btn => btn.addEventListener('click', () => {
    renderRolePick(btn.getAttribute('data-role'));
  }));

  const goDash = document.getElementById('goDashFromProfile');
  if(goDash) goDash.addEventListener('click', () => { app.tab='dashboard'; renderApp(); });
  const goCat = document.getElementById('goCatFromProfile');
  if(goCat) goCat.addEventListener('click', () => { app.tab='produits'; renderApp(); });
}

/* ================= ASSISTANT IA FLOTTANT (réel, branché sur le catalogue et les demandes) ================= */
let aiInitialized = false;

function initAIAssistant(){
  const btn = document.getElementById('aiFloatBtn');
  const panel = document.getElementById('aiPanel');
  btn.addEventListener('click', () => {
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    if(!isOpen && !aiInitialized){
      addAIMessage("Bonjour ! Dites-moi ce que vous cherchez — je regarde en direct dans le vrai catalogue Aksina, ce n'est pas une réponse préécrite.", 'bot');
      aiInitialized = true;
    }
  });
  document.getElementById('aiPanelClose').addEventListener('click', () => panel.style.display = 'none');
  document.getElementById('aiSend').addEventListener('click', sendAIMessage);
  document.getElementById('aiInput').addEventListener('keydown', e => { if(e.key === 'Enter') sendAIMessage(); });
}

function addAIMessage(text, who){
  const box = document.getElementById('aiMessages');
  const bubble = document.createElement('div');
  bubble.style.cssText = who==='user' ? 'text-align:right;margin-bottom:8px;' : 'margin-bottom:8px;';
  bubble.innerHTML = `<span style="display:inline-block;max-width:85%;padding:8px 11px;border-radius:10px;background:${who==='user'?'#1E3A5F':'#F4F6F8'};color:${who==='user'?'#fff':'#0F1720'};font-size:12px;line-height:1.5;">${text}</span>`;
  box.appendChild(bubble);
  box.scrollTop = box.scrollHeight;
}

async function sendAIMessage(){
  const input = document.getElementById('aiInput');
  const q = input.value.trim();
  if(!q) return;
  addAIMessage(esc(q), 'user');
  input.value = '';

  const catalogue = await fetchCatalogueAll();
  const matches = catalogue.filter(c => c.produit.toLowerCase().includes(q.toLowerCase()));

  if(matches.length){
    const best = matches.sort((a,b) => Number(a.prix)-Number(b.prix))[0];
    addAIMessage(`J'ai trouvé <b>${esc(best.produit)}</b> chez ${esc(best.vendeurNom)} (${esc(best.zone)}) à <b>${money(best.prix)} F</b>. J'ouvre la recherche pour vous.`, 'bot');
    setTimeout(() => {
      document.getElementById('aiPanel').style.display = 'none';
      if(app.role === 'client'){ app.tab = 'search'; renderApp(); setTimeout(() => runSearch(q), 150); }
    }, 1000);
  } else if(app.role === 'client'){
    addAIMessage(`Personne ne propose « ${esc(q)} » pour l'instant près de vous. J'envoie une demande réelle aux vendeurs de votre zone via One Seek AI.`, 'bot');
    setTimeout(() => { document.getElementById('aiPanel').style.display = 'none'; sendRequest(q); }, 1200);
  } else {
    addAIMessage(`Aucun résultat pour « ${esc(q)} » dans le catalogue actuel.`, 'bot');
  }
}

initAIAssistant();
boot();
</script>
